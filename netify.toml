[build]
command   = "pnpm build"
publish   = ".next"
functions = "netlify/functions"       # only if you use Netlify Functions

[[redirects]]
from = "/*"
to   = "/.netlify/functions/next"
status = 200

[context.production.environment]
NODE_ENV = "production"
NEXT_PUBLIC_APP_URL = "https://YOUR_NETLIFY_DOMAIN.netlify.app"
NEXTAUTH_URL = "https://YOUR_NETLIFY_DOMAIN.netlify.app"

[[plugins]]
package = "@netlify/plugin-nextjs"