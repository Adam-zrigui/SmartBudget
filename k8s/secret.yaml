apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: smartbudget
  labels:
    app: smartbudget
type: Opaque
stringData:
  nextauth-secret: "your-nextauth-secret-here-change-me"
  database-url: "postgresql://neondb_owner:password@host.neon.tech/neondb"
  google-client-id: "your-google-client-id"
  google-client-secret: "your-google-client-secret"
  groq-api-key: "gsk_your-groq-api-key-here"
---
apiVersion: v1
kind: Secret
metadata:
  name: smartbudget-tls
  namespace: smartbudget
  labels:
    app: smartbudget
type: kubernetes.io/tls
data:
  tls.crt: LS0tLS1CRUdJTi... # your base64 encoded certificate
  tls.key: LS0tLS1CRUdJTi... # your base64 encoded private key

