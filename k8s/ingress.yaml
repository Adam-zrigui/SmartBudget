apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smartbudget-ingress
  namespace: default
  labels:
    app: smartbudget
  annotations:
    kubernetes.io/ingress.class: "nginx"  # or "gce" for GKE
spec:
  rules:
  - host: your-domain.com  # change to your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: smartbudget-service
            port:
              number: 80
  tls:
  - hosts:
    - your-domain.com
    secretName: tls-secret  # create a TLS secret separately
