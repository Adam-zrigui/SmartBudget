apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartbudget
  namespace: default
  labels:
    app: smartbudget
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smartbudget
  template:
    metadata:
      labels:
        app: smartbudget
    spec:
      containers:
      - name: next-app
        image: your-registry/smartbudget:latest  # change to your registry
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: NEXTAUTH_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: nextauth-url
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: nextauth-secret
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: database-url
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: google-client-id
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: google-client-secret
              optional: true
        - name: COHERE_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: cohere-api-key
              optional: true
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
