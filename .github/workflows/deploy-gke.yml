name: Build and Deploy to GKE

on:
  push:
    branches:
      - main
      - develop

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: smartbudget-cluster
  GKE_ZONE: us-central1-a
  DEPLOYMENT_NAME: smartbudget
  IMAGE: smartbudget
  REGISTRY_HOSTNAME: gcr.io

jobs:
  build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        service_account_key: ${{ secrets.GCP_SA_KEY }}
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        export_default_credentials: true

    - name: Configure Docker to use gcloud as a credential helper
      run: |
        gcloud auth configure-docker ${{ env.REGISTRY_HOSTNAME }}

    - name: Build Docker image
      run: |
        docker build -t "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE }}:${{ github.sha }}" \
          -t "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE }}:latest" .

    - name: Push Docker image to GCR
      run: |
        docker push "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE }}:${{ github.sha }}"
        docker push "${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE }}:latest"

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        service_account_key: ${{ secrets.GCP_SA_KEY }}
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Get GKE credentials
      run: |
        gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
          --zone ${{ env.GKE_ZONE }} \
          --project ${{ env.PROJECT_ID }}

    - name: Create/Update Secrets
      run: |
        kubectl create secret generic app-secrets \
          --from-literal=nextauth-secret=${{ secrets.NEXTAUTH_SECRET }} \
          --from-literal=database-url=${{ secrets.DATABASE_URL }} \
          --from-literal=google-client-id=${{ secrets.GOOGLE_CLIENT_ID }} \
          --from-literal=google-client-secret=${{ secrets.GOOGLE_CLIENT_SECRET }} \
          --from-literal=hf-api-key=${{ secrets.HF_API_KEY }} \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Update Deployment image
      run: |
        kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
          next-app=${{ env.REGISTRY_HOSTNAME }}/${{ env.PROJECT_ID }}/${{ env.IMAGE }}:${{ github.sha }} \
          --record

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }}
