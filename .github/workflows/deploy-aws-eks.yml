name: Deploy to AWS EKS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get ECR repository URL
        run: |
          echo "ECR_REGISTRY=$(aws ecr describe-repositories --repository-names smartbudget --query 'repositories[0].repositoryUri' --output text)" >> $GITHUB_ENV

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}:${{ github.sha }} .
          docker build -t ${{ env.ECR_REGISTRY }}:latest .
          docker push ${{ env.ECR_REGISTRY }}:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}:latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name smartbudget --region us-east-1

      - name: Update Kubernetes deployment
        run: |
          kubectl set image deployment/smartbudget \
            next-app=${{ env.ECR_REGISTRY }}:${{ github.sha }} \
            -n smartbudget \
            --record

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/smartbudget -n smartbudget --timeout=5m

      - name: Verify deployment
        run: |
          kubectl get pods -n smartbudget
          kubectl get svc -n smartbudget

      - name: Get LoadBalancer URL
        run: |
          LB_URL=$(kubectl get svc -n smartbudget -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}')
          echo "Application URL: http://$LB_URL" >> $GITHUB_STEP_SUMMARY

      - name: Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "SmartBudget AWS EKS Deployment",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "EKS Deployment: ${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
